<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yuvraj Angad Singh — Resume</title>
  <style>
    :root {
      --bg: #f0f0f0;
      --bar: #fff;
      --text: #333;
      --border: #ddd;
      --btn-bg: #333;
      --btn-text: #fff;
      --btn-hover: #555;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bar: #252525;
        --text: #ddd;
        --border: #333;
        --btn-bg: #555;
        --btn-hover: #777;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .bar h1 { font-size: 16px; font-weight: 600; }
    .download {
      display: inline-block;
      padding: 8px 16px;
      background: var(--btn-bg);
      color: var(--btn-text);
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }
    .download:hover { background: var(--btn-hover); }
    .viewer {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 20px;
      overflow: auto;
    }
    .viewer iframe {
      width: 100%;
      max-width: 900px;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
    }
    @media (max-width: 640px) {
      .bar { padding: 10px 14px; }
      .bar h1 { font-size: 14px; }
      .download { padding: 6px 12px; font-size: 13px; }
      .viewer { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="bar">
    <h1>Yuvraj Angad Singh</h1>
    <a class="download" href="Yuvraj-Angad-Singh-Resume.pdf" download>Download PDF</a>
  </div>
  <div class="viewer">
    <iframe src="Yuvraj-Angad-Singh-Resume.pdf" type="application/pdf"></iframe>
  </div>
</body>
</html>
